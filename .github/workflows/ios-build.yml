name: ZepAsset V1
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Generate Icon Assets Matrix
        run: |
          mkdir -p icons
          if [ ! -f "icon.png" ]; then
            echo "icon.png not found. Generating template..."
            sips -s format png -z 1024 1024 /System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/GenericApplicationIcon.icns --out icon.png
          fi
          for size in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $size $size icon.png --out icons/zepasset-$size.png
          done

      - name: Create Briefcase iOS Scaffold
        run: briefcase create ios --no-input

      - name: Compile App Binary Layout
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
        run: briefcase build ios --no-input -u

      - name: Package Unsigned IPA Archive
        run: |
          # 1. Track down the precise directory path where the binary bundle sits
          APP_PATH=$(find build/zepasset/ios/xcode/build -name "ZepAsset.app" -type d | head -n 1)
          echo "Target binary discovered at: $APP_PATH"
          
          # 2. Extract and move into its parent build folder environment
          TARGET_DIR=$(dirname "$APP_PATH")
          cd "$TARGET_DIR"
          
          # 3. Assemble and compress into standard deployment layout structure
          mkdir -p Payload
          cp -R ZepAsset.app Payload/
          zip -r "$GITHUB_WORKSPACE/ZepAsset.ipa" Payload
          
      - name: Archive Production Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZepAsset-Mobile-Build
          path: ZepAsset.ipa
          retention-days: 5
