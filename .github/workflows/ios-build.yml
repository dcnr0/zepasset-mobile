name: Build ZepAsset iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Changed to macos-14 to guarantee a modern Xcode build environment
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Modern Xcode Version
      run: |
        # Force the runner to select Xcode 15 or newer
        sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Compile Unsigned App Binary
      run: |
        xcodebuild clean build \
          -project ZepAsset.xcodeproj \
          -scheme ZepAsset \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_IDENTITY="-" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          SYMROOT=build

    - name: Package into IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/ZepAsset.app Payload/
        zip -r ZepAsset.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZepAsset-Unsigned-IPA
        path: ZepAsset.ipa
