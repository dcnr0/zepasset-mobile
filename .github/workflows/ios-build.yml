name: ZepAsset V1
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      # 👇 AUTO-GENERATES ALL 13 REQUIRED SIZES FROM YOUR SINGLE icon.png
      - name: Generate Icon Assets Matrix
        run: |
          mkdir -p icons
          for size in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $size $size icon.png --out icons/zepasset-$size.png
          done

      - name: Create Briefcase iOS Scaffold
        run: briefcase create ios --no-input

      - name: Compile App Binary Layout
        run: briefcase build ios --no-input --update-resources

      - name: Package Unsigned IPA Archive
        run: |
          cd build/zepasset/ios/xcode/build/Debug-iphonesimulator/
          mkdir -p Payload
          cp -R ZepAsset.app Payload/
          zip -r ../../../../../../ZepAsset.ipa Payload
          
      - name: Archive Production Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZepAsset-Mobile-Build
          path: ZepAsset.ipa
          retention-days: 5
