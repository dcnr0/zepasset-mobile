name: ZepAsset V1
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        # 👇 ADDED 'pillow' HERE so Python can draw the backup icon safely!
        run: |
          python -m pip install --upgrade pip
          pip install briefcase pillow

      - name: Generate Icon Assets Matrix
        run: |
          mkdir -p icons
          if [ ! -f "icon.png" ]; then
            echo "icon.png not found. Creating placeholder..."
            python -c "
from PIL import Image, ImageDraw
img = Image.new('RGBA', (1024, 1024), (20, 5, 7, 255))
d = ImageDraw.Draw(img)
d.rectangle([64, 64, 960, 960], outline=(255, 51, 51, 255), width=16)
img.save('icon.png')
            "
          fi
          for size in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $size $size icon.png --out icons/zepasset-$size.png
          done

      - name: Create Briefcase iOS Scaffold
        run: briefcase create ios --no-input

      - name: Compile App Binary Layout
        run: briefcase build ios --device "iOS" --no-input --update-resources -- CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Package Unsigned IPA Archive
        run: |
          TARGET_DIR=$(ls -d build/zepasset/ios/xcode/build/*-iphoneos | head -n 1)
          echo "Target build directory found: $TARGET_DIR"
          
          cd "$TARGET_DIR"
          mkdir -p Payload
          cp -R ZepAsset.app Payload/
          zip -r ../../../../../../ZepAsset.ipa Payload
          
      - name: Archive Production Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZepAsset-Mobile-Build
          path: ZepAsset.ipa
          retention-days: 5
