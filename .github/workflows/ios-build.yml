name: ZepAsset V1
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Create Briefcase iOS Scaffold
        run: briefcase create ios --no-input

      - name: Compile App Binary Layout
        run: briefcase build ios --no-input

      - name: Package Unsigned IPA Archive
        run: |
          # 1. Navigate to the actual build outputs directory
          cd build/zepasset/ios/xcode/build/Debug-iphonesimulator/
          
          # 2. Build standard structural Payload scaffolding required for IPA packaging
          mkdir -p Payload
          
          # 3. Clone the compiled application into the structural layer
          cp -R ZepAsset.app Payload/
          
          # 4. Standard zip compression execution mapping outward to the root directory
          zip -r ../../../../../../ZepAsset.ipa Payload
          
      - name: Archive Production Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZepAsset-Mobile-Build
          path: build/zepasset/ios/xcode/ZepAsset.ipa
          retention-days: 5
