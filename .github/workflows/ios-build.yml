name: ZepAsset V1
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Generate Icon Assets Matrix
        run: |
          mkdir -p icons
          if [ ! -f "icon.png" ]; then
            echo "icon.png not found. Generating template..."
            sips -s format png -z 1024 1024 /System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/GenericApplicationIcon.icns --out icon.png
          fi
          for size in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $size $size icon.png --out icons/zepasset-$size.png
          done

      - name: Create Briefcase iOS Scaffold
        run: briefcase create ios --no-input

      - name: Compile App Binary Layout
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
        run: briefcase build ios --no-input -u

      - name: Patch Architecture and Package IPA
        run: |
          # 1. Locate the compiled app directory wrapper dynamically
          APP_PATH=$(find build/zepasset/ios/xcode/build -name "ZepAsset.app" -type d | head -n 1)
          echo "Discovered compiled app target at: $APP_PATH"
          
          # 2. Modify Info.plist configuration tags to lock onto real iOS hardware requirements
          plutil -replace LSRequiresIPhoneOS -bool true "$APP_PATH/Info.plist"
          plutil -replace CFBundleSupportedPlatforms -json '["iPhoneOS"]' "$APP_PATH/Info.plist"
          plutil -remove DTPlatformName "$APP_PATH/Info.plist" 2>/dev/null || true
          plutil -insert DTPlatformName -string "iphoneos" "$APP_PATH/Info.plist"
          
          # 3. Step into the build directory path context
          TARGET_DIR=$(dirname "$APP_PATH")
          cd "$TARGET_DIR"
          
          # 4. Construct the standard deployment structural Payload container
          mkdir -p Payload
          cp -R ZepAsset.app Payload/
          
          # 5. Compress asset files into a clean installation archive package
          zip -r "$GITHUB_WORKSPACE/ZepAsset.ipa" Payload
          
      - name: Archive Production Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZepAsset-Mobile-Build
          path: ZepAsset.ipa
          retention-days: 5
