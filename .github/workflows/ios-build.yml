name: Build ZepAsset iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Upgrade to macos-15 for the newest project parser environments
    runs-on: macos-15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Newest Xcode Version
      run: |
        # Use the standardized path mapping for the latest stable toolsets
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Compile Unsigned App Binary
      run: |
        xcodebuild clean build \
          -project ZepAsset.xcodeproj \
          -scheme ZepAsset \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_IDENTITY="-" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          SYMROOT=build

    - name: Package into IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/ZepAsset.app Payload/
        zip -r ZepAsset.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZepAsset-Unsigned-IPA
        path: ZepAsset.ipa
