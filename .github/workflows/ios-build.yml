name: Build ZepAsset iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode.app

    - name: Compile Unsigned App Binary
      run: |
        xcodebuild clean build \
          -project ZepAsset.xcodeproj \
          -scheme ZepAsset \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_IDENTITY="-" \
          PROVISIONING_PROFILE_SPECIFIER=""

    - name: Package into IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/ZepAsset.app Payload/
        zip -r ZepAsset.zip Payload
        mv ZepAsset.zip ZepAsset.ipa

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZepAsset-Unsigned-IPA
        path: ZepAsset.ipa
