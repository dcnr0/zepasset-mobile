name: ZepAsset V1
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Generate Icon Assets Matrix
        run: |
          mkdir -p icons
          if [ ! -f "icon.png" ]; then
            echo "icon.png not found. Generating template..."
            sips -s format png -z 1024 1024 /System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/GenericApplicationIcon.icns --out icon.png
          fi
          for size in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $size $size icon.png --out icons/zepasset-$size.png
          done

      - name: Create Briefcase iOS Scaffold
        run: briefcase create ios --no-input

      - name: Compile App Binary Layout
        # 👇 Safe configuration variables passed directly into the step environment
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
        run: briefcase build ios --no-input -u

      - name: Package Unsigned IPA Archive
        run: |
          # Finds whatever active build directory matches the output scheme
          TARGET_DIR=$(ls -d build/zepasset/ios/xcode/build/*-iphoneos 2>/dev/null | head -n 1 || ls -d build/zepasset/ios/xcode/build/*-iphonesimulator 2>/dev/null | head -n 1)
          echo "Target build directory found: $TARGET_DIR"
          
          cd "$TARGET_DIR"
          mkdir -p Payload
          cp -R ZepAsset.app Payload/
          zip -r ../../../../../../ZepAsset.ipa Payload
          
      - name: Archive Production Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZepAsset-Mobile-Build
          path: ZepAsset.ipa
          retention-days: 5
